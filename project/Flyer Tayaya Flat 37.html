<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Tayayá — Flat 37</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #1c130b; }
  body { display: flex; justify-content: center; }
  .flyer {
    position: relative;
    width: 1024px;
    height: 1536px;
    flex: 0 0 auto;
    overflow: hidden;
    font-family: 'Oswald', sans-serif;
  }
  .flyer > img.base {
    position: absolute;
    inset: 0;
    width: 1024px;
    height: 1536px;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }
  .patch { position: absolute; overflow: hidden; }

  /* ---- Cover A: top-right banner (CHALÉ DE 6 PESSOAS) ---- */
  #coverA {
    left: 802px; top: 56px; width: 201px; height: 167px;
    background-image: url('tiles/darkwood.png');
    background-size: 201px 167px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 9px 0 7px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 7px, #000 calc(100% - 7px), transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 7px, #000 calc(100% - 7px), transparent 100%);
  }
  #coverA .l1 {
    font-family: 'Oswald', sans-serif; font-weight: 700; color: #fdf6e8;
    text-transform: uppercase; letter-spacing: .3px; line-height: 1;
    text-shadow: 0 2px 4px rgba(0,0,0,.7); white-space: nowrap; margin-top: 1px;
  }
  #coverA .l1 .big { font-size: 35px; }
  #coverA .l1 .small { font-size: 24px; font-weight: 600; margin-left: 6px; }
  #coverA .num {
    font-family: 'Anton', sans-serif; font-size: 82px; line-height: .82;
    background: linear-gradient(180deg, #fef0a6 0%, #f6cf57 38%, #e7a92f 70%, #c9831c 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    color: #f0bf45;
    -webkit-text-stroke: 1.5px rgba(60,30,4,.55);
    filter: drop-shadow(0 3px 4px rgba(0,0,0,.6));
    margin: -4px 0 -2px;
  }
  #coverA .l3 {
    font-family: 'Oswald', sans-serif; font-weight: 700; color: #fdf6e8;
    font-size: 34px; text-transform: uppercase; letter-spacing: .2px; line-height: 1; white-space: nowrap;
    text-shadow: 0 2px 4px rgba(0,0,0,.7);
  }

  /* ---- Cover B: ÓTIMA LOCALIZAÇÃO! (keeps original pin) ---- */
  #coverB {
    left: 822px; top: 226px; width: 183px; height: 89px;
    background: #0b0e09;
    display: flex; align-items: center; padding-top: 0;
  }
  #coverB .loc {
    font-family: 'Oswald', sans-serif; font-weight: 600; color: #fdf6e8;
    font-size: 19px; line-height: 1.12; text-transform: uppercase; letter-spacing: .1px;
    text-shadow: 0 2px 4px rgba(0,0,0,.8); padding-left: 9px; padding-right: 4px;
  }

  /* ---- FESCAFE row -> DISPONÍVEL ---- */
  #coverF {
    left: 714px; top: 820px; width: 247px; height: 48px;
    background-image: url('tiles/creamtile.png');
    background-size: 247px 48px;
    display: flex; align-items: center; gap: 12px; padding-left: 6px;
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 6px, #000 calc(100% - 4px), transparent 100%);
            mask-image: linear-gradient(to right, transparent 0, #000 6px, #000 calc(100% - 4px), transparent 100%);
  }
  #coverF .check {
    width: 24px; height: 24px; flex: 0 0 auto; border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #259642, #176029);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 2px rgba(0,0,0,.3), inset 0 1px 2px rgba(255,255,255,.25);
  }
  #coverF .check svg { width: 14px; height: 14px; display: block; }
  #coverF .txt {
    font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 19px;
    color: #2c2113; text-transform: uppercase; letter-spacing: .3px;
  }

  /* ---- Bottom: phone number ---- */
  #coverP {
    left: 262px; top: 1467px; width: 726px; height: 39px;
    background: #0c0805;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  #coverP .wa { width: 26px; height: 26px; flex: 0 0 auto; display: block; }
  #coverP .phone {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 30px; line-height: 1;
    letter-spacing: .5px; white-space: nowrap;
    color: #f3c54e;
    text-shadow: 0 2px 3px rgba(0,0,0,.7);
  }
</style>
</head>
<body>
  <div class="flyer">
    <img class="base" src="uploads/WhatsApp Image 2026-06-06 at 13.09.21.jpeg" alt="Agenda Tayayá">

    <!-- CHALÉ DE 6 PESSOAS -->
    <div class="patch" id="coverA">
      <div class="l1"><span class="big">CHALÉ</span><span class="small">DE</span></div>
      <div class="num">6</div>
      <div class="l3">PESSOAS</div>
    </div>

    <!-- ÓTIMA LOCALIZAÇÃO! -->
    <div class="patch" id="coverB">
      <div class="loc">Ótima localização!</div>
    </div>

    <!-- FESCAFE row now available -->
    <div class="patch" id="coverF">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5l5 5 11-11" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="txt">Disponível</div>
    </div>

    <!-- WhatsApp phone number -->
    <div class="patch" id="coverP">
      <svg class="wa" viewBox="0 0 32 32" fill="#25D366"><path d="M16 3C9.4 3 4 8.4 4 15c0 2.1.6 4.1 1.6 5.9L4 29l8.3-1.6c1.7.9 3.6 1.4 5.7 1.4 6.6 0 12-5.4 12-12S22.6 3 16 3z"/><path d="M22.5 18.6c-.3-.2-2-1-2.3-1.1-.3-.1-.5-.2-.8.2-.2.3-.9 1.1-1.1 1.3-.2.2-.4.2-.7.1-.3-.2-1.4-.5-2.6-1.6-1-.9-1.6-1.9-1.8-2.2-.2-.3 0-.5.1-.7.1-.1.3-.4.5-.6.1-.2.2-.3.3-.6.1-.2 0-.4 0-.6-.1-.2-.8-1.9-1.1-2.6-.3-.7-.6-.6-.8-.6h-.7c-.2 0-.6.1-.9.4-.3.3-1.2 1.2-1.2 2.8 0 1.7 1.2 3.3 1.4 3.5.2.2 2.4 3.7 5.8 5.1 2.9 1.2 3.5 1 4.1.9.6-.1 2-.8 2.3-1.6.3-.8.3-1.4.2-1.6-.1-.1-.3-.2-.6-.4z" fill="#fff"/></svg>
      <span class="phone">(11) 99559-3778</span>
    </div>
  </div>
</body>
</html>
